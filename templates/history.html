<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>录音转写</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: { 50: '#eef8f3', 100: '#d5ede2', 200: '#a8dbc6', 300: '#6dc4a3', 400: '#3aad83', 500: '#00965E', 600: '#007a4d', 700: '#005e3b', 800: '#00432a', 900: '#002919' }
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif; }
        .card { transition: all 0.2s ease; }
        .card:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.06); transform: translateY(-1px); }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">

    <!-- 导航 -->
    <nav class="bg-white/80 backdrop-blur-md border-b border-gray-100 sticky top-0 z-50">
        <div class="max-w-3xl mx-auto px-5 h-12 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="w-6 h-6 rounded-md bg-gradient-to-br from-brand-500 to-brand-600 flex items-center justify-center">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
                        <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
                    </svg>
                </div>
                <span class="text-sm font-semibold text-gray-800">录音转写</span>
            </div>
            <div class="flex gap-4 text-[12px]">
                <a href="/" class="text-gray-400 hover:text-gray-600 transition-colors">上传</a>
                <a href="/history" class="text-brand-600 font-medium">历史</a>
                <a href="/logout" class="text-gray-400 hover:text-gray-600 transition-colors">退出</a>
            </div>
        </div>
    </nav>

    <div class="max-w-2xl mx-auto px-5 py-8">
        <h2 class="text-sm font-semibold text-gray-700 mb-5">转写记录</h2>

        <div id="historyList" class="space-y-3"></div>

        <div id="emptyState" class="hidden text-center py-20">
            <div class="w-16 h-16 rounded-2xl bg-gray-100 flex items-center justify-center mx-auto mb-4">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#d1d5db" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
                    <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
                </svg>
            </div>
            <p class="text-sm text-gray-400 mb-3">暂无转写记录</p>
            <a href="/" class="inline-flex items-center gap-1.5 text-[13px] text-brand-600 hover:text-brand-700 font-medium transition-colors">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                上传音频
            </a>
        </div>
    </div>

    <script>
        async function loadHistory() {
            const tasks = JSON.parse(localStorage.getItem('transcribe_tasks') || '[]');
            const listEl = document.getElementById('historyList');
            const emptyEl = document.getElementById('emptyState');

            if (!tasks.length) {
                emptyEl.classList.remove('hidden');
                return;
            }

            for (const t of tasks) {
                try {
                    const resp = await fetch('/api/result/' + t.tid);
                    const data = await resp.json();
                    if (data.error) continue;

                    const segCount = (data.segments || []).length;
                    const card = document.createElement('a');
                    card.href = '/result/' + t.tid;
                    card.className = 'card block bg-white rounded-2xl shadow-sm border border-gray-100 p-5';
                    card.innerHTML = `
                        <div class="flex justify-between items-center">
                            <div class="flex items-center gap-3">
                                <div class="w-10 h-10 rounded-xl bg-brand-50 flex items-center justify-center flex-shrink-0">
                                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#00965E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
                                        <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
                                    </svg>
                                </div>
                                <div>
                                    <p class="text-sm font-medium text-gray-800">${data.filename || t.name}</p>
                                    <p class="text-[12px] text-gray-400 mt-0.5">${data.created_at || t.time || ''} · ${segCount} 段</p>
                                </div>
                            </div>
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#d1d5db" stroke-width="2" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg>
                        </div>
                    `;
                    listEl.appendChild(card);
                } catch (e) {}
            }

            if (!listEl.children.length) {
                emptyEl.classList.remove('hidden');
            }
        }

        loadHistory();
    </script>
</body>
</html>
