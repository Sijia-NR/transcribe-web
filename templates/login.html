<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>录音转写</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: { 50: '#eef8f3', 100: '#d5ede2', 200: '#a8dbc6', 300: '#6dc4a3', 400: '#3aad83', 500: '#00965E', 600: '#007a4d', 700: '#005e3b', 800: '#00432a', 900: '#002919' }
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif; }
        .login-btn { transition: all 0.2s ease; }
        .login-btn:hover { background-color: #005e3b; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(0,150,94,0.3); }
        .login-btn:active { transform: translateY(0); }
        input:focus { box-shadow: 0 0 0 3px rgba(0,150,94,0.12); border-color: #00965E; }
        .logo-icon { background: linear-gradient(135deg, #007a4d 0%, #00965E 100%); }
    </style>
</head>
<body class="bg-gradient-to-br from-gray-50 to-green-50/30 min-h-screen flex items-center justify-center">
    <div class="w-full max-w-sm px-4">
        <div class="bg-white rounded-2xl shadow-xl shadow-green-900/5 p-8 border border-gray-100">
            <div class="flex justify-center mb-6">
                <div class="logo-icon w-12 h-12 rounded-xl flex items-center justify-center shadow-lg shadow-green-600/20">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
                        <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
                        <line x1="12" y1="19" x2="12" y2="23"/>
                        <line x1="8" y1="23" x2="16" y2="23"/>
                    </svg>
                </div>
            </div>
            <h1 class="text-xl font-semibold text-center text-gray-800 mb-1">录音转写</h1>
            <p class="text-sm text-gray-400 text-center mb-7">输入密码登录</p>
            {% if error %}
            <div class="bg-red-50 border border-red-100 text-red-600 px-4 py-2.5 rounded-xl mb-4 text-sm">{{ error }}</div>
            {% endif %}
            <form method="POST" action="/login">
                <input type="password" name="password" placeholder="请输入密码"
                       class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-sm outline-none transition-all placeholder:text-gray-300 mb-4"
                       autofocus required>
                <button type="submit"
                        class="login-btn w-full bg-brand-600 text-white py-3 rounded-xl text-sm font-medium">
                    登录
                </button>
            </form>
        </div>
    </div>
</body>
</html>
